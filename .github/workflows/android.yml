name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compile debug sources
        run: gradle :app:compileDebugKotlin :app:compileDebugJavaWithJavac --stacktrace --info

      - name: Run unit tests
        run: gradle :app:testDebugUnitTest --stacktrace --info

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --stacktrace --info

      - name: Upload test and build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/apk/debug/**
          if-no-files-found: ignore
