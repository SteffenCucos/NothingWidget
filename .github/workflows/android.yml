name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Prepare CI log directory
        run: mkdir -p ci-logs

      - name: Compile debug sources
        shell: bash
        run: |
          set -o pipefail
          gradle :app:compileDebugKotlin :app:compileDebugJavaWithJavac --stacktrace --info 2>&1 | tee ci-logs/compile-debug.log

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle :app:testDebugUnitTest --stacktrace --info 2>&1 | tee ci-logs/unit-tests.log

      - name: Assemble debug APK
        shell: bash
        run: |
          set -o pipefail
          gradle :app:assembleDebug --stacktrace --info 2>&1 | tee ci-logs/assemble-debug.log

      - name: Upload Gradle logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-ci-logs
          path: ci-logs/**
          if-no-files-found: ignore

      - name: Upload test and build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            app/build/reports/**
            app/build/test-results/**
            app/build/outputs/apk/debug/**
          if-no-files-found: ignore
